name: Build
on: 
  workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - run: pip install flet
      - run: flet build apk
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/apk/
